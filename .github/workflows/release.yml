name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0-alpha.1)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Format check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Go code is not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.5
        continue-on-error: true

      - name: Lint
        run: golangci-lint run ./... || true
        continue-on-error: true

      - name: Run tests
        run: go test -v -race ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip chocolatey
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name || github.event.inputs.version }}

      - name: Generate release summary
        run: |
          echo "# Release ${{ github.ref_name || github.event.inputs.version }}" > release-summary.md
          echo "" >> release-summary.md
          echo "## Artifacts" >> release-summary.md
          echo "" >> release-summary.md
          echo "- Cross-platform binaries (Linux, macOS, Windows)" >> release-summary.md
          echo "- Archive formats: tar.gz, zip" >> release-summary.md
          echo "- Linux packages: deb, rpm, arch (pacman)" >> release-summary.md
          echo "- Windows packages: chocolatey" >> release-summary.md
          echo "" >> release-summary.md
          echo "## Installation" >> release-summary.md
          echo "" >> release-summary.md
          echo 'Download from the [GitHub Release](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name || github.event.inputs.version }})' >> release-summary.md

      - name: Upload release summary
        uses: actions/upload-artifact@v4
        with:
          name: release-summary
          path: release-summary.md
          retention-days: 30

  chocolatey:
    runs-on: windows-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: false

      - name: Build Chocolatey package
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip announce,publish,validate,archive,brews,nfpm,srpm,arch,deb,rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name || github.event.inputs.version }}
