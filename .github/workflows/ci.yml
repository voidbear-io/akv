name: CI

on:
  push:
  pull_request:
  schedule:
    # Monday 06:00 UTC — periodic dependency / vulnerability check
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: github.event_name != 'schedule'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Check go mod
        run: go mod tidy && git diff --exit-code

      - name: Check formatting
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Go code is not formatted. Run 'go fmt ./...'"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      # Build from source with the same Go toolchain as CI so the binary matches
      # the language version in go.mod (prebuilt releases can lag behind, e.g. 1.24 < 1.25).
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5

      - name: Lint
        run: golangci-lint run ./...

  vulnerability:
    name: Vulnerability check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  build-and-test:
    if: github.event_name != 'schedule'
    name: Build and Test
    strategy:
      matrix:
        go-version: ["1.26.x"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Run tests
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          else
            go test -v -race ./...
          fi

      - name: Run integration tests
        run: go test -v -tags=integration ./...

      - name: Cross-compile smoke
        if: matrix.os == 'ubuntu-latest'
        run: |
          GOOS=linux GOARCH=amd64 go build -o /dev/null ./...
          GOOS=linux GOARCH=arm64 go build -o /dev/null ./...
          GOOS=darwin GOARCH=amd64 go build -o /dev/null ./...
          GOOS=darwin GOARCH=arm64 go build -o /dev/null ./...
          GOOS=windows GOARCH=amd64 go build -o /dev/null ./...
          GOOS=windows GOARCH=arm64 go build -o /dev/null ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30

      # Uncomment when Codecov is configured
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v4
      #   if: matrix.os == 'ubuntu-latest'
      #   with:
      #     file: ./coverage.out
      #     fail_ci_if_error: true
